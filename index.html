<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Beležka</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f4f4f9; }
        header { background: #333; color: white; padding: 1rem; text-align: center; font-weight: bold; }
        textarea { flex: 1; border: none; padding: 1rem; font-size: 1.1rem; outline: none; resize: none; background: #fff; }
        .status { font-size: 0.8rem; padding: 0.5rem; color: #666; text-align: right; background: #eee; }
    </style>
</head>
<body>

<header>MOJA BELEŽKA</header>
<textarea id="note" placeholder="Tukaj začni pisati..."></textarea>
<div id="status" class="status">Shranjeno lokalno</div>

<script>
    const noteArea = document.getElementById('note');
    const status = document.getElementById('status');

    // Naloži shranjeno vsebino ob zagonu
    noteArea.value = localStorage.getItem('moja_beleznica_vsebina') || "";

    // Shrani vsebino ob vsakem pritisku tipke (Autosave)
    noteArea.addEventListener('input', () => {
        localStorage.setItem('moja_beleznica_vsebina', noteArea.value);
        status.innerText = "Shranjevanje...";
        setTimeout(() => { status.innerText = "Shranjeno v telefon"; }, 500);
    });

    // Registracija Service Workerja za offline delovanje
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

</body>
</html>
